<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风林慧策 · 深度分析报告</title>
<style>
:root {
  --navy: #1E40AF; --gold: #CA8A04; --red: #DC2626; --green: #16A34A;
  --text: #1A1A2E; --text2: #6B7280; --text3: #9CA3AF;
  --border: #E5E7EB; --surface: #F8F9FA; --white: #FFFFFF;
  --font: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#F8F9FA; color:var(--text); font-family:var(--font); font-size:15px; line-height:1.6; }
header { background:var(--white); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
header h1 { font-size:1rem; color:var(--navy); margin:0; white-space:nowrap; }
header h1 .gold { color:var(--gold); }
.header-stock { margin-left:auto; text-align:right; }
.stock-name { font-size:1.1rem; font-weight:700; }
.stock-code { font-size:0.75rem; color:var(--text3); }
.stock-price { font-size:1.3rem; font-weight:700; }
.stock-chg { font-size:0.85rem; margin-left:8px; }
.nav-btn { text-decoration:none; color:var(--navy); font-size:0.8rem; padding:4px 12px; border:1px solid var(--border); border-radius:16px; }

main { max-width:860px; margin:0 auto; padding:20px 16px 60px; }

/* PMQD Card */
.pmqd-card { background:var(--white); border-radius:16px; border:1px solid var(--border); padding:28px; margin-bottom:16px; text-align:center; }
.pmqd-ring { width:160px; height:160px; border-radius:50%; border:6px solid var(--border); margin:12px auto; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.pmqd-score { font-size:3rem; font-weight:800; line-height:1; }
.pmqd-max { font-size:0.8rem; color:var(--text3); }
.pmqd-verdict { font-size:1rem; font-weight:700; margin-top:4px; }
.pmqd-stars { font-size:0.85rem; color:var(--gold); margin-top:2px; }

/* Section */
.section { background:var(--white); border-radius:16px; border:1px solid var(--border); padding:24px; margin-bottom:16px; }
.section-title { font-size:0.95rem; font-weight:700; color:var(--text); margin-bottom:16px; padding-bottom:10px; border-bottom:2px solid #EEF2FF; }

/* Grids */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
@media(max-width:600px){ .grid2,.grid3{grid-template-columns:1fr;} }

/* Dimension Bars */
.dim-bar { display:flex; align-items:center; gap:12px; padding:10px 0; }
.dim-letter { font-size:1.5rem; font-weight:800; width:36px; text-align:center; }
.dim-label { font-size:0.82rem; color:var(--text2); min-width:100px; }
.dim-track { flex:1; height:8px; background:#F3F4F6; border-radius:4px; overflow:hidden; }
.dim-fill { height:100%; border-radius:4px; transition:width 0.6s; }
.dim-score { font-size:0.85rem; font-weight:700; min-width:50px; text-align:right; }

/* KPI */
.kpi { background:var(--surface); border-radius:12px; padding:16px; text-align:center; }
.kpi-label { font-size:0.75rem; color:var(--text3); }
.kpi-val { font-size:1.2rem; font-weight:700; margin-top:4px; }

/* Strategy */
.strategy-box { padding:20px; border-radius:12px; border:2px solid; border-left-width:6px; }
.strategy-title { font-size:1rem; font-weight:700; margin-bottom:6px; }
.strategy-desc { font-size:0.85rem; color:var(--text2); }

/* Safety */
.safety-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid #F3F4F6; }
.safety-item:last-child { border-bottom:none; }
.safety-icon { font-size:1rem; min-width:24px; }
.safety-text { font-size:0.85rem; }

/* Health grid */
.health-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.health-item { display:flex; align-items:center; gap:8px; padding:6px 0; }
.health-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.health-name { font-size:0.8rem; color:var(--text); }
.health-status { font-size:0.72rem; color:var(--text2); margin-left:auto; }

/* Finance Rules */
.rule-item { display:flex; gap:10px; padding:12px 0; border-bottom:1px solid #F3F4F6; }
.rule-item:last-child { border-bottom:none; }
.rule-icon { font-size:1rem; min-width:24px; }
.rule-name { font-size:0.85rem; font-weight:600; }
.rule-val { font-size:0.78rem; color:var(--text2); }
.rule-desc { font-size:0.72rem; color:var(--text3); }

/* Debt */
.debt-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.debt-item { background:var(--surface); border-radius:10px; padding:12px; }
.debt-label { font-size:0.72rem; color:var(--text3); }
.debt-val { font-size:1rem; font-weight:700; margin-top:2px; }

/* Insights */
.insight-item { padding:6px 0; font-size:0.85rem; color:var(--text); }
.insight-item::before { content:"• "; color:var(--navy); }

/* Loading */
.loading { text-align:center; padding:80px 20px; }
.spinner { width:48px; height:48px; border:4px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to{transform:rotate(360deg);} }

/* Error */
.error-card { background:#FFF5F5; border:1px solid #FECACA; border-radius:12px; padding:32px; text-align:center; }
.error-title { font-size:1.1rem; font-weight:700; color:var(--red); margin-bottom:8px; }
.error-desc { font-size:0.85rem; color:var(--text2); margin-bottom:16px; }
.btn-primary { display:inline-block; padding:10px 28px; background:var(--navy); color:#fff; border:none; border-radius:20px; font-size:0.9rem; cursor:pointer; text-decoration:none; }

footer { text-align:center; padding:24px; color:var(--text3); font-size:0.75rem; }
</style>
</head>
<body>

<header>
  <a href="index.html" style="text-decoration:none;color:inherit;">
    <h1><span class="gold">风</span>林<span class="gold">慧</span>策</h1>
  </a>
  <div style="font-size:0.75rem;color:var(--text3);">PMQD V5.9</div>
  <div id="headerStockInfo" class="header-stock" style="display:none;">
    <div class="stock-name" id="sName">--</div>
    <div class="stock-code" id="sCode">--</div>
    <span class="stock-price" id="sPrice">--</span>
    <span class="stock-chg" id="sChg">--</span>
  </div>
  <a href="javascript:history.back()" class="nav-btn">← 返回</a>
</header>

<main id="mainContent">
  <!-- Loading state -->
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div style="color:var(--text2);" id="loadingText">正在加载分析数据…</div>
  </div>
</main>

<footer>风林慧策 AI 价值投资 · PMQD V5.9 · 不构成投资建议</footer>

<script>
// ═══════════════ Report Engine ═══════════════
(function(){
  var main = document.getElementById('mainContent');

  // ── Read URL params ──
  var params = {};
  (location.search||'').replace(/^\?/,'').split('&').forEach(function(s){
    var p = s.split('='); if(p[0]) params[decodeURIComponent(p[0])] = decodeURIComponent(p[1]||'');
  });
  var code = params.code || '000333';
  var market = params.market || 'sz';
  var name = params.name || code;

  // Market suffix mapping
  var mkSuffix = {sh:'.SH',sz:'.SZ',hk:'.HK',us:'.US'}[market] || '.SZ';

  // Show header
  document.getElementById('headerStockInfo').style.display = '';
  document.getElementById('sName').textContent = name;
  document.getElementById('sCode').textContent = market + code + mkSuffix;
  document.getElementById('loadingText').textContent = '正在获取 ' + name + ' 分析数据…';

  document.title = name + ' · 深度分析 — 风林慧策';

  // Remove market prefix for lookup
  var cleanCode = code.replace(/^(sh|sz|bj|hk|us)/,'');

  // ── Step 1: Try CDN cache ──
  fetch('data/reports/' + cleanCode + '.json', {cache:'default'})
    .then(function(r){ if(!r.ok) throw new Error('no cache'); return r.json(); })
    .then(function(data){ renderReport(data); })
    .catch(function(){
      // ── Step 2: Try API ──
      var apiBase = location.hostname.endsWith('.pages.dev') ?
        'https://windforest-api.414946437.workers.dev' : 'https://api.windforest.cn';

      fetch(apiBase + '/api/analysis?code=' + encodeURIComponent(code) + '&market=' + encodeURIComponent(market))
        .then(function(r){ if(!r.ok) throw new Error('API fail'); return r.json(); })
        .then(function(res){
          if (res.status === 'ok' && res.data) {
            renderReport(normalizeApiData(res.data, code, market, name));
          } else {
            showNoData();
          }
        })
        .catch(function(){ showNoData(); });
    });

  // ── Convert API response to report format ──
  function normalizeApiData(d, code, market, name) {
    var p = d.p || d.pmqd_p_score || 0, m = d.m || d.pmqd_m_score || 0;
    var q = d.q || d.pmqd_q_score || 0, d2 = d.d || d.pmqd_d_score || 0;
    var total = d.pmqd_total || (p+m+q+d2) || 0;
    return {
      meta: { stock:{code:code,market:market,name:name||d.name||''}, engine:'PMQD V5.9' },
      pmqd: {
        total:total,
        verdict: d.pmqd_verdict || verdictFromScore(total),
        dimensions: {
          P:{score:p,max:40,label:'价格安全边际',color:'#1E40AF'},
          M:{score:m,max:18,label:'行业/结构催化',color:'#0D9488'},
          Q:{score:q,max:30,label:'不可替代硬质量',color:'#B45309'},
          D:{score:d2,max:12,label:'市场认知差',color:'#7C3AED'}
        },
        strategy: d.strategy || '', strategy_reason: d.strategy_reason || ''
      },
      valuation: {
        pe:d.pe||0, pb:d.pb||0, roe:d.roe||0, div_yield:d.div_yield||0,
        market_cap:d.market_cap||'', net_cash:d.net_cash||'',
        price:d.price||0, change_pct:d.change_pct||0
      },
      kelly:{ f:d.kelly_f||0, verdict:d.kelly_verdict||'' },
      safety: d.safety || [],
      health: d.health || [],
      finance_rules: d.finance_rules || [],
      debt: d.debt || [],
      insights: d.insights || [],
      risks: d.risks || []
    };
  }

  function verdictFromScore(s) {
    if (s>=80) return '深度价值，建议重仓';
    if (s>=65) return '优质低估，值得配置';
    if (s>=50) return '估值合理，保持观察';
    if (s>=35) return '安全边际不足';
    return '暂不具备投资价值';
  }

  // ── Show "no data available" ──
  function showNoData() {
    var apiBase = location.hostname.endsWith('.pages.dev') ?
      'https://windforest-api.414946437.workers.dev' : 'https://api.windforest.cn';
    main.innerHTML =
      '<div class="error-card" id="noDataCard">' +
      '<div class="error-title">' + name + ' 深度分析数据正在准备中</div>' +
      '<div class="error-desc">该标的尚未在本地数据库中预计算。<br>点击下方按钮可触发实时分析流程。</div>' +
      '<button id="btnTrigger" class="btn-primary" onclick="triggerAnalysis()" style="font-size:1rem;padding:14px 40px;">⚡ 触发实时分析</button>' +
      '<div id="triggerMsg" style="margin-top:16px;font-size:0.85rem;color:var(--text2);"></div>' +
      '<a href="index.html" class="btn-primary" style="background:var(--text2);margin-left:12px;">返回首页</a>' +
      '</div>';
  }

  // ═══════════════ TRIGGER ANALYSIS ═══════════════
  window.triggerAnalysis = function() {
    var btn = document.getElementById('btnTrigger');
    var msg = document.getElementById('triggerMsg');
    if (!btn) return;
    btn.disabled = true;
    btn.textContent = '⏳ 正在提交…';
    msg.textContent = '正在连接分析引擎…';

    var apiBase = location.hostname.endsWith('.pages.dev') ?
      'https://windforest-api.414946437.workers.dev' : 'https://api.windforest.cn';

    fetch(apiBase + '/api/trigger-analysis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code, market: market })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === 'triggered') {
        msg.innerHTML = '✅ 实时分析已启动！<br>正在获取 ' + name + ' 的实时数据，预计 3-5 分钟完成。<br>' +
          '<br>分析引擎：westock-data → 三源交叉验证 → 财务穿透 → PMQD V5.9<br>' +
          '<br><a href="javascript:location.reload()" style="color:var(--navy);">🔄 点击刷新查看结果</a>';
        btn.textContent = '✅ 分析已触发';
      } else {
        msg.innerHTML = '⚠️ ' + (data.message || '分析触发失败') + '<br>请稍后重试或联系管理员。';
        btn.textContent = '⚡ 重试';
        btn.disabled = false;
      }
    })
    .catch(function() {
      // API unreachable — try to do basic analysis client-side
      msg.innerHTML = '⚠️ 分析引擎 API 暂不可达。<br>请直接在搜索框输入待分析股票代码，系统将自动生成基础分析。<br><br>' +
        '<a href="index.html" style="color:var(--navy);">🔍 返回首页重新搜索</a>';
      btn.textContent = '已尝试';
    });
  };

  // ═══════════════ RENDER ═══════════════
  function renderReport(d) {
    if (!d || !d.pmqd) { showNoData(); return; }

    // Update header price
    if (d.valuation.price) {
      document.getElementById('sPrice').textContent = '¥' + Number(d.valuation.price).toFixed(2);
      var chg = d.valuation.change_pct || 0;
      var color = chg>=0?'var(--red)':'var(--green)';
      document.getElementById('sChg').textContent = (chg>=0?'▲':'▼')+' '+(chg>=0?'+':'')+Number(chg).toFixed(2)+'%';
      document.getElementById('sChg').style.color = color;
      document.getElementById('sPrice').style.color = color;
    }

    // Build verdict color
    var s = d.pmqd.total;
    var vc = s>=80?'var(--gold)':s>=65?'var(--green)':s>=50?'var(--navy)':s>=35?'#B45309':'var(--red)';

    // Get dimensions
    var dims = [d.pmqd.dimensions.P, d.pmqd.dimensions.M, d.pmqd.dimensions.Q, d.pmqd.dimensions.D];

    // Build HTML
    var html = '';

    // PMQD Card
    html += '<div class="pmqd-card">';
    html += '<div style="font-size:0.85rem;color:var(--text2);">PMQD V5.9 综合评分</div>';
    html += '<div class="pmqd-ring"><div class="pmqd-score" style="color:'+vc+';">' + s + '</div><div class="pmqd-max">/ 100</div></div>';
    html += '<div class="pmqd-verdict" style="color:'+vc+';">' + (d.pmqd.verdict||'--') + '</div>';
    if (d.pmqd.stars) html += '<div class="pmqd-stars">' + d.pmqd.stars + '</div>';
    html += '</div>';

    // Dimensions
    html += '<div class="section"><div class="section-title">四维拆解</div>';
    dims.forEach(function(dim){
      var pct = Math.round(dim.score/dim.max*100);
      html += '<div class="dim-bar"><span class="dim-letter" style="color:'+dim.color+';">' +
        ['P','M','Q','D'][dims.indexOf(dim)] + '</span>' +
        '<span class="dim-label">'+dim.label+'</span>' +
        '<div class="dim-track"><div class="dim-fill" style="width:'+pct+'%;background:'+dim.color+';"></div></div>' +
        '<span class="dim-score">'+dim.score+'/'+dim.max+'</span></div>';
    });
    html += '</div>';

    // Strategy
    if (d.pmqd.strategy) {
      var sc = s>=65?'var(--gold)':s>=50?'var(--navy)':'var(--border)';
      html += '<div class="section"><div class="section-title">策略判定</div>';
      html += '<div class="strategy-box" style="border-left-color:'+sc+';">';
      html += '<div class="strategy-title">' + (d.pmqd.strategy||'--') + '</div>';
      html += '<div class="strategy-desc">' + (d.pmqd.strategy_reason||'') + '</div>';
      html += '</div></div>';
    }

    // Safety
    if (d.safety && d.safety.length) {
      html += '<div class="section"><div class="section-title">安全边际三问</div>';
      d.safety.forEach(function(item){
        html += '<div class="safety-item"><span class="safety-icon">'+item.status+'</span><span class="safety-text">'+item.q+'</span></div>';
      });
      html += '</div>';
    }

    // Kelly
    if (d.kelly && d.kelly.f > 0) {
      html += '<div class="section"><div class="section-title">凯利公式 V5.2</div>';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
      html += '<div><span style="font-size:2rem;font-weight:800;color:var(--gold);">'+d.kelly.f+'%</span><span style="font-size:0.8rem;color:var(--text2);"> 建议下注</span></div>';
      html += '<span style="font-size:0.9rem;font-weight:600;">'+(d.kelly.verdict||'')+'</span></div>';
      html += '</div>';
    }

    // Valuation KPIs
    html += '<div class="section"><div class="section-title">估值概览</div>';
    html += '<div class="grid3">';
    ['PE','PB','ROE'].forEach(function(k){
      html += '<div class="kpi"><div class="kpi-label">'+k+'</div><div class="kpi-val">'+(d.valuation[k.toLowerCase()]||'--')+'</div></div>';
    });
    html += '</div><div class="grid3" style="margin-top:12px;">';
    html += '<div class="kpi"><div class="kpi-label">股息率</div><div class="kpi-val">'+(d.valuation.div_yield||'--')+'%</div></div>';
    html += '<div class="kpi"><div class="kpi-label">市值</div><div class="kpi-val" style="font-size:0.95rem;">'+(d.valuation.market_cap||'--')+'</div></div>';
    html += '<div class="kpi"><div class="kpi-label">净现金</div><div class="kpi-val" style="font-size:0.95rem;">'+(d.valuation.net_cash||'--')+'</div></div>';
    html += '</div></div>';

    // Health
    if (d.health && d.health.length) {
      html += '<div class="section"><div class="section-title">8维健康体检</div><div class="health-grid">';
      d.health.forEach(function(h){
        html += '<div class="health-item"><div class="health-dot" style="background:'+(h.ok?'var(--green)':'var(--red)')+';"></div>';
        html += '<span class="health-name">'+h.name+'</span><span class="health-status">'+h.status+'</span></div>';
      });
      html += '</div></div>';
    }

    // Finance rules
    if (d.finance_rules && d.finance_rules.length) {
      html += '<div class="section"><div class="section-title">财务穿透 · 四条铁律</div>';
      d.finance_rules.forEach(function(r){
        html += '<div class="rule-item"><span class="rule-icon">'+(r.pass?'✅':'❌')+'</span>';
        html += '<div><div class="rule-name">'+r.name+'</div>';
        html += '<div class="rule-val">'+r.value+'</div>';
        html += '<div class="rule-desc">'+r.desc+'</div></div></div>';
      });
      html += '</div>';
    }

    // Debt
    if (d.debt && d.debt.length) {
      html += '<div class="section"><div class="section-title">偿债能力 · 7维度</div><div class="debt-grid">';
      d.debt.forEach(function(dd){
        html += '<div class="debt-item"><div class="debt-label">'+dd.label+'</div>';
        html += '<div class="debt-val" style="color:'+(dd.ok?'var(--green)':'var(--red)')+';">'+dd.val+'</div></div>';
      });
      html += '</div></div>';
    }

    // Insights
    if (d.insights && d.insights.length) {
      html += '<div class="section"><div class="section-title">投资洞见</div>';
      d.insights.forEach(function(ins){
        html += '<div class="insight-item">'+ins+'</div>';
      });
      html += '</div>';
    }

    // Risks
    if (d.risks && d.risks.length) {
      html += '<div class="section"><div class="section-title">风险提示</div>';
      d.risks.forEach(function(r){
        html += '<div class="insight-item" style="color:var(--red);">'+r+'</div>';
      });
      html += '</div>';
    }

    // Disclaimer
    html += '<div style="text-align:center;padding:20px;color:var(--text3);font-size:0.75rem;">分析引擎: '+d.meta.engine+' · 不构成投资建议</div>';

    main.innerHTML = html;
  }

})();
</script>

</body>
</html>
