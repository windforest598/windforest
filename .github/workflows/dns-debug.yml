# 🔍 诊断 DNS 问题
name: DNS Debug

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    name: Debug DNS for windforest.cn
    runs-on: ubuntu-latest
    steps:
      - name: Query Cloudflare Zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== Querying Cloudflare API ==="
          ZONE_INFO=$(curl -sv "https://api.cloudflare.com/client/v4/zones?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN" 2>&1)
          echo "$ZONE_INFO" | tail -20
          
          echo ""
          echo "=== Parsing Zone ID ==="
          ZONE_ID=$(echo "$ZONE_INFO" | jq -r '.result[0].id // "NOT_FOUND"')
          echo "Zone ID: $ZONE_ID"
          
          if [ "$ZONE_ID" = "NOT_FOUND" ] || [ -z "$ZONE_ID" ]; then
            echo "❌ Zone windforest.cn NOT found in Cloudflare account"
            exit 1
          fi
          
          echo "✅ Zone found: $ZONE_ID"
          
          echo ""
          echo "=== All DNS Records ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '
              if .success then
                (.result // []) | to_entries | .[] | "  [\(.value.type)] \(.value.name) → \(.value.content) [proxied: \(.value.proxied)]"
              else
                "API Error: \(.errors)"
              end
            '
          
          echo ""
          echo "=== Pages Custom Domains ==="
          ACCOUNT_ID="15c2945c1130560bdeed9757fc61ddae"
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/windforest/domains" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '
              if .success then
                (.result // []) | to_entries | .[] | "  \(.value.name) [status: \(.value.status)]"
              else
                "API Error: \(.errors)"
              end
            '
