name: Final DNS Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Add DNS records
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e

          # Get Zone ID
          echo "=== Getting Zone ID ==="
          ZONE_RESP=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json")
          echo "$ZONE_RESP" | python3 -m json.tool | head -20

          ZONE_ID=$(echo "$ZONE_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])")
          echo "Zone ID: $ZONE_ID"

          # Step 1: Create A record for windforest.cn → Pages (proxied via Cloudflare)
          # Pages custom domain binding should auto-create the CNAME,
          # but if it didn't, we create a proxied A record as fallback
          echo ""
          echo "=== 1) Add A record for windforest.cn ==="
          A_RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "CNAME",
              "name": "windforest.cn",
              "content": "windforest.pages.dev",
              "ttl": 1,
              "proxied": true
            }')
          echo "$A_RESP" | python3 -m json.tool
          A_OK=$(echo "$A_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success',False))")
          echo "Result: $A_OK"

          # Step 2: Add www CNAME
          echo ""
          echo "=== 2) Add CNAME for www.windforest.cn ==="
          WWW_RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "CNAME",
              "name": "www",
              "content": "windforest.pages.dev",
              "ttl": 1,
              "proxied": true
            }')
          echo "$WWW_RESP" | python3 -m json.tool
          WWW_OK=$(echo "$WWW_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success',False))")
          echo "Result: $WWW_OK"

          # Step 3: Add CNAME for api.windforest.cn
          # Point to the workers.dev domain
          echo ""
          echo "=== 3) Add CNAME for api.windforest.cn ==="
          API_RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "CNAME",
              "name": "api",
              "content": "windforest-api.414946437.workers.dev",
              "ttl": 1,
              "proxied": true
            }')
          echo "$API_RESP" | python3 -m json.tool
          API_OK=$(echo "$API_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success',False))")
          echo "Result: $API_OK"

          # Step 4: Verify all records
          echo ""
          echo "=== 4) Verify DNS records ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?per_page=10" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for r in d.get('result',[]):
              print(f\"  {r['type']:6} {r['name']:30} → {r['content']:40} proxied={r['proxied']}\")
          "

          # Summary
          echo ""
          echo "══════════════════════════════════════════════"
          if [ "$A_OK" = "True" ] && [ "$API_OK" = "True" ]; then
            echo "  ✅ All DNS records created successfully!"
          else
            echo "  ⚠️ Some records failed: windforest=$A_OK, api=$API_OK, www=$WWW_OK"
          fi
          echo "══════════════════════════════════════════════"
