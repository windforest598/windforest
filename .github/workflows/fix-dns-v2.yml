# 🔧 逐步骤修复 DNS（每步都检查返回结果）
name: Fix DNS With Checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fix:
    name: Fix DNS Records
    runs-on: ubuntu-latest
    steps:
      - name: Get Zone ID
        id: zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          RESP=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN")
          echo "=== Zone Query Response ==="
          echo "$RESP"
          ZONE_ID=$(echo "$RESP" | jq -r '.result[0].id // ""')
          if [ -z "$ZONE_ID" ]; then
            echo "FATAL: Zone not found"
            exit 1
          fi
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT

      - name: Delete all existing DNS records
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID="${{ steps.zone.outputs.zone_id }}"
          echo "=== Listing existing records ==="
          RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN")
          echo "$RECORDS" | jq '.result[] | {id, type, name, content}' 2>/dev/null || echo "(no records or parse error)"
          
          # Delete each record
          echo "$RECORDS" | jq -r '.result[]?.id' | while read id; do
            if [ -n "$id" ]; then
              echo "Deleting record: $id"
              curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$id" \
                -H "Authorization: Bearer $CF_TOKEN" | jq '{success, id: .result.id}'
            fi
          done

      - name: Add CNAME api → Worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID="${{ steps.zone.outputs.zone_id }}"
          RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"api","content":"windforest-api.414946437.workers.dev","proxied":true,"ttl":1}')
          echo "=== API CNAME Response ==="
          echo "$RESP" | jq .
          SUCCESS=$(echo "$RESP" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "ERROR creating api CNAME"
            echo "$RESP" | jq '.errors'
            exit 1
          fi
          echo "✅ api.windforest.cn CNAME created"

      - name: Add CNAME www → Pages
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID="${{ steps.zone.outputs.zone_id }}"
          RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"www","content":"windforest.pages.dev","proxied":true,"ttl":1}')
          echo "=== WWW CNAME Response ==="
          echo "$RESP" | jq .
          SUCCESS=$(echo "$RESP" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "ERROR creating www CNAME"
            echo "$RESP" | jq '.errors'
            exit 1
          fi
          echo "✅ www.windforest.cn CNAME created"

      - name: Add A record for root domain → Pages
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID="${{ steps.zone.outputs.zone_id }}"
          # Use Cloudflare Pages IPs for root domain
          RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"A","name":"@","content":"192.0.2.1","proxied":true,"ttl":1}')
          echo "=== Root A Response ==="
          echo "$RESP" | jq .
          SUCCESS=$(echo "$RESP" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "ERROR creating root A record"
            echo "$RESP" | jq '.errors'
            exit 1
          fi
          echo "✅ windforest.cn A record created"
