# 🔧 添加 DNS 记录（最简版）
name: Add DNS Records

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  add-records:
    name: Add CNAME Records
    runs-on: ubuntu-latest
    steps:
      - name: Get Zone ID
        id: zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[0].id')
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "Zone: $ZONE_ID"

      - name: Add CNAME for api.windforest.cn → Worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone_id }}/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"api","content":"windforest-api.414946437.workers.dev","proxied":true,"ttl":1}'

      - name: Add CNAME for windforest.cn → Pages
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone_id }}/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"@","content":"windforest.pages.dev","proxied":true,"ttl":1}'
