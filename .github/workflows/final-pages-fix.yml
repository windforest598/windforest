# 🔄 Delete + Re-add Pages custom domains to trigger auto-CNAME creation
name: "Final Pages DNS Fix"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Delete and re-add Pages custom domains
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          DOMAINS_API="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/windforest/domains"

          for domain in windforest.cn www.windforest.cn; do
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Processing: $domain"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Step A: Delete existing domain binding
            echo "🗑️  Deleting $domain..."
            DEL=$(curl -s -X DELETE "$DOMAINS_API/$domain" \
              -H "Authorization: Bearer $CF_TOKEN")
            echo "   Delete: $(echo $DEL | jq -r '.success')"

            sleep 2

            # Step B: Re-add domain binding (zone is now active, auto-CNAME should work)
            echo "➕ Re-adding $domain..."
            ADD=$(curl -s -X POST "$DOMAINS_API" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"$domain\"}")
            echo "$ADD" | jq '{success, errors: .errors[0].message, status: .result.status, verification: .result.verification_status}'

            sleep 2
          done

          echo ""
          echo "════════════════════════════════════════════════"
          echo "  ✅ Pages domains re-bound. DNS should auto-create now."
          echo ""
          echo "  Checking DNS propagation from GitHub Actions..."
          echo "════════════════════════════════════════════════"

          # Wait a bit for Cloudflare to create the CNAME records
          sleep 5

          for domain in windforest.cn www.windforest.cn api.windforest.cn; do
            IPS=$(dig +short $domain @1.1.1.1 A 2>/dev/null)
            CNAME=$(dig +short $domain @1.1.1.1 CNAME 2>/dev/null)
            if [ -n "$IPS" ] || [ -n "$CNAME" ]; then
              echo "  ✅ $domain → ${IPS:-$CNAME}"
            else
              echo "  ⏳ $domain → (still propagating...)"
            fi
          done

          echo ""
          echo "════════════════════════════════════════════════"
          echo "  FINAL STATUS"
          echo "  🌐 https://windforest.cn"
          echo "  🌐 https://www.windforest.cn"
          echo "  🔌 https://api.windforest.cn/api/health"
          echo "════════════════════════════════════════════════"
