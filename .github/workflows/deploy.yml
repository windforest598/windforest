# 🚀 一键部署到 Cloudflare (GitHub Actions)
# 推送代码后自动部署 Workers API + Pages 前端

name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: read

jobs:
  # ─── Job 1: 部署 Workers API ───
  deploy-worker:
    name: Deploy Workers API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Install Dependencies
        working-directory: fullstack
        run: npm install

      - name: Apply D1 migrations (stocks table)
        working-directory: fullstack
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 先执行 schema 确保表结构
          wrangler d1 execute windforest-db --remote --command="$(cat src/db/schema.sql)" 2>&1 || true
          echo "Schema applied"

      - name: Seed D1 with comprehensive stock list
        working-directory: fullstack
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 检查已有股票数量
          COUNT=$(wrangler d1 execute windforest-db --remote --command="SELECT COUNT(*) as cnt FROM stocks" --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('results',[{}])[0].get('cnt',0) if isinstance(d,list) else 0)" 2>/dev/null || echo 0)
          echo "Current stocks in D1: $COUNT"
          # 如果少于3000只，说明需要补全（之前只有178只）
          if [ "$COUNT" -lt 3000 ]; then
            echo "Seeding $COUNT→3243 stocks..."
            # 分批执行（INSERT语句太多可能超时）
            python3 -c "
import re
with open('src/db/seed.sql','r',encoding='utf-8') as f:
    content = f.read()
blocks = re.findall(r'INSERT OR IGNORE INTO stocks[^;]+;', content)
print(f'Found {len(blocks)} INSERT blocks')
for i, block in enumerate(blocks):
    print(f'Block {i+1}/{len(blocks)}')
    import subprocess, tempfile, os
    with tempfile.NamedTemporaryFile(mode='w', suffix='.sql', delete=False, encoding='utf-8') as f:
        f.write(block)
        f.flush()
        r = subprocess.run(['npx','wrangler','d1','execute','windforest-db','--remote','--file='+f.name], capture_output=True, text=True, env={**os.environ,'CLOUDFLARE_API_TOKEN':'$CLOUDFLARE_API_TOKEN','CLOUDFLARE_ACCOUNT_ID':'$CLOUDFLARE_ACCOUNT_ID'})
        if r.returncode != 0:
            print(f'  ERROR: {r.stderr[:200]}')
        else:
            print(f'  OK')
        os.unlink(f.name)
" 2>&1
          else
            echo "Database already has $COUNT stocks, skipping seed."
          fi

      - name: Deploy Worker
        working-directory: fullstack
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler deploy --keep-vars

  # ─── Job 2: 部署 Pages 前端 ───
  deploy-pages:
    name: Deploy Pages Frontend
    runs-on: ubuntu-latest
    needs: deploy-worker  # 等 Worker 部署完再部署前端
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 pages deploy . \
            --project-name=windforest \
            --branch=main \
            --commit-hash=${{ github.sha }}

  # ─── Job 3: 种子数据（仅首次）───
  seed-database:
    name: Seed D1 Database (if needed)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'  # 仅手动触发时执行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Seed D1 Database
        working-directory: fullstack
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 检查是否已有数据
          COUNT=$(wrangler d1 execute windforest-db --remote --command="SELECT COUNT(*) as cnt FROM stocks" --json | jq -r '.result[0].results[0].cnt')
          if [ "$COUNT" -eq "0" ]; then
            echo "Seeding database..."
            wrangler d1 execute windforest-db --remote --file=src/db/seed.sql
          else
            echo "Database already seeded ($COUNT stocks), skipping."
          fi
