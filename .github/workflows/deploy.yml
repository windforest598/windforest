# 🚀 一键部署到 Cloudflare (GitHub Actions)
# 推送代码后自动部署 Workers API + Pages 前端

name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: read

jobs:
  # ─── Job 1: 部署 Workers API ───
  deploy-worker:
    name: Deploy Workers API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Install Dependencies
        working-directory: fullstack
        run: npm install

      - name: Apply D1 schema (stocks table)
        working-directory: fullstack
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true
        run: |
          echo "Applying D1 schema..."
          wrangler d1 execute windforest-db --remote --command="$(cat src/db/schema.sql)" 2>&1 || true
          echo "Schema applied (table already exists is OK)"

      - name: Deploy Worker
        working-directory: fullstack
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler deploy --keep-vars

  # ─── Job 2: 部署 Pages 前端 ───
  deploy-pages:
    name: Deploy Pages Frontend
    runs-on: ubuntu-latest
    needs: deploy-worker  # 等 Worker 部署完再部署前端
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 pages deploy . \
            --project-name=windforest \
            --branch=main \
            --commit-hash=${{ github.sha }}

  # ─── Job 3: 种子数据（仅手动触发）───
  seed-database:
    name: Seed D1 Database
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.seed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Seed D1 with full stock list
        working-directory: fullstack
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute windforest-db --remote --file=src/db/seed.sql 2>&1
