# 🔍 完整诊断 DNS 状态
name: DNS Full Debug

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    name: Full DNS Diagnostic
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Check Zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== ZONE QUERY ==="
          curl -s "https://api.cloudflare.com/client/v4/zones?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" | jq '{success, zone_id: .result[0].id, status: .result[0].status, name: .result[0].name, errors}'

      - name: Step 2 - List DNS Records
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[0].id')
          echo "Zone ID: $ZONE_ID"
          echo ""
          echo "=== DNS RECORDS ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?per_page=50" \
            -H "Authorization: Bearer $CF_TOKEN" | jq '{success, count: (.result | length), records: [.result[] | {type, name, content, proxied}]}'

      - name: Step 3 - List Worker Routes
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[0].id')
          echo "=== WORKER ROUTES ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes" \
            -H "Authorization: Bearer $CF_TOKEN" | jq '{success, routes: [.result[] | {pattern, script}]}'

      - name: Step 4 - Pages Domains
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== PAGES DOMAINS ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/15c2945c1130560bdeed9757fc61ddae/pages/projects/windforest/domains" \
            -H "Authorization: Bearer $CF_TOKEN" | jq '{success, domains: [.result[] | {name, status, validation_data}]}'
