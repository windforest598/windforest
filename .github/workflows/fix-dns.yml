# 🔧 检查并修复 windforest.cn 的 DNS 记录
name: Fix DNS Records

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fix-dns:
    name: Fix DNS Records for windforest.cn
    runs-on: ubuntu-latest

    steps:
      - name: Check existing DNS records
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 获取 Zone ID
          ZONE_INFO=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN")
          ZONE_ID=$(echo "$ZONE_INFO" | jq -r '.result[0].id // empty')
          ZONE_STATUS=$(echo "$ZONE_INFO" | jq -r '.result[0].status // empty')
          
          echo "Zone ID: $ZONE_ID"
          echo "Zone Status: $ZONE_STATUS"
          
          if [ -z "$ZONE_ID" ]; then
            echo "❌ Zone not found!"
            exit 1
          fi
          
          # 列出所有 DNS 记录
          echo ""
          echo "=== Current DNS Records ==="
          RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_TOKEN")
          echo "$RECORDS" | jq -r '.result[] | "  \(.type)  \(.name)  →  \(.content)  [proxied: \(.proxied)]"'
          
          RECORD_COUNT=$(echo "$RECORDS" | jq -r '.result | length')
          echo ""
          echo "Total records: $RECORD_COUNT"

      - name: Ensure api.windforest.cn A record exists
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_INFO=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN")
          ZONE_ID=$(echo "$ZONE_INFO" | jq -r '.result[0].id')
          
          # Check if api A record exists
          API_RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=api.windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN")
          API_COUNT=$(echo "$API_RECORDS" | jq -r '.result | length')
          
          if [ "$API_COUNT" -eq 0 ]; then
            echo "Creating API DNS record..."
            RESULT=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"type":"CNAME","name":"api","content":"windforest-api.414946437.workers.dev","proxied":true,"comment":"API Worker"}')
            echo "$RESULT" | jq .
            SUCCESS=$(echo "$RESULT" | jq -r '.success')
            if [ "$SUCCESS" = "true" ]; then
              echo "✅ api.windforest.cn CNAME record created"
            else
              echo "❌ Failed to create CNAME record"
              echo "$RESULT" | jq '.errors'
            fi
          else
            echo "⚠️  api.windforest.cn record(s) already exist:"
            echo "$API_RECORDS" | jq -r '.result[] | "  \(.type) → \(.content) [proxied: \(.proxied)]"'
          fi

      - name: Ensure windforest.cn CNAME record for Pages
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_INFO=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN")
          ZONE_ID=$(echo "$ZONE_INFO" | jq -r '.result[0].id')
          
          # Check root domain records
          ROOT_RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=windforest.cn" \
            -H "Authorization: Bearer $CF_TOKEN")
          ROOT_COUNT=$(echo "$ROOT_RECORDS" | jq -r '.result | length')
          
          if [ "$ROOT_COUNT" -eq 0 ]; then
            echo "No root domain records found. Creating CNAME for Pages..."
            RESULT=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"type":"CNAME","name":"@","content":"windforest.pages.dev","proxied":true,"comment":"Pages Frontend"}')
            echo "$RESULT" | jq .
            SUCCESS=$(echo "$RESULT" | jq -r '.success')
            if [ "$SUCCESS" = "true" ]; then
              echo "✅ windforest.cn → Pages CNAME record created"
            else
              echo "❌ Failed: $(echo "$RESULT" | jq -r '.errors[0].message')"
            fi
          else
            echo "Root domain records exist:"
            echo "$ROOT_RECORDS" | jq -r '.result[] | "  \(.type) → \(.content) [proxied: \(.proxied)]"'
          fi

      - name: Verify DNS resolution
        run: |
          echo ""
          echo "=== Verifying DNS ==="
          echo ""
          echo "--- windforest.cn ---"
          dig +short windforest.cn A 2>/dev/null || echo "  (no A record)"
          dig +short windforest.cn AAAA 2>/dev/null || echo "  (no AAAA record)"
          dig +short windforest.cn CNAME 2>/dev/null || echo "  (no CNAME)"
          echo ""
          echo "--- api.windforest.cn ---"
          dig +short api.windforest.cn A 2>/dev/null || echo "  (no A record)"
          dig +short api.windforest.cn AAAA 2>/dev/null || echo "  (no AAAA record)"
          dig +short api.windforest.cn CNAME 2>/dev/null || echo "  (no CNAME)"
          echo ""
          echo "=== Final Status ==="
          echo "✅ Fix DNS workflow completed"
          echo "⚠️  DNS propagation may take 5-15 minutes after changes"
